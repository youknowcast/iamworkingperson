name: build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.0'
          bundler-cache: true
      - name: Rubocop
        run: bundle exec rubocop
      - name: RSpec
        run: bundle exec rspec
